# render.yaml — 一键部署到 Render（https://render.com）
# 用法：把本仓库推到 GitHub 后，在 Render 后台 New → Blueprint，选中此仓库即可自动按本文件部署。
databases:
  - name: mini-agent-db
    databaseName: miniagent
    user: miniagent
    plan: free              # 免费 PostgreSQL（90 天到期，可续）
    postgresMajorVersion: "15"
services:
  - type: web
    name: mini-agent
    runtime: python
    plan: free
    region: oregon            # 离国内更近可选 singapore（在 Render 后台也能改）
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    # 数据持久化：已接 Render 免费 PostgreSQL（DATABASE_URL 自动注入），重启/redeploy 不丢数据。
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: MOCK
        value: "false"
      # 关闭 MCP 子进程以节省内存：Render 免费实例仅 512MB，拉起 2 个 MCP server 子进程
      # 极易在冷启动阶段 OOM，导致服务进程起不来 -> Render 显示 no-server。本地开发可删掉这行。
      - key: ENABLE_MCP
        value: "false"
      # 家教模式：true = 切换为 K12 私人家教人设（苏格拉底式启发 + 按学生水平/性格自适应）
      - key: TUTOR_MODE
        value: "true"
      # 数据库连接串：由上方 databases 自动创建并注入（无需手动填）
      - key: DATABASE_URL
        fromDatabase:
          name: mini-agent-db
          property: connectionString
      # 以下三个是密钥：务必在 Render 后台 Environment 里手动填（sync:false 表示不从仓库读取）
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: OPENAI_MODEL
        sync: false
      # GitHub OAuth（用于插件面板的 GitHub 授权连接）
      # 需在 github.com/settings/developers 注册 OAuth App 后获取，在 Render Environment 填入
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
