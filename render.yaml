# render.yaml — 一键部署到 Render（https://render.com）
# 用法：把本仓库推到 GitHub 后，在 Render 后台 New → Blueprint，选中此仓库即可自动按本文件部署。
services:
  - type: web
    name: mini-agent
    runtime: python
    plan: free
    region: oregon            # 离国内更近可选 singapore（在 Render 后台也能改）
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: MOCK
        value: "false"
      # 以下三个是密钥：务必在 Render 后台 Environment 里手动填（sync:false 表示不从仓库读取）
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: OPENAI_MODEL
        sync: false
