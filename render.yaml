# render.yaml — 一键部署到 Render（https://render.com）
# 用法：把本仓库推到 GitHub 后，在 Render 后台 New → Blueprint，选中此仓库即可自动按本文件部署。
services:
  - type: web
    name: mini-agent
    runtime: python
    plan: free
    region: oregon            # 离国内更近可选 singapore（在 Render 后台也能改）
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    # 免费计划不支持持久盘（disk），数据存在容器临时文件系统内。
    # 重启/redeploy 后聊天记录会重置。如需持久化请将 plan 改为 starter 并取消下方 disk 注释。
    # disk:
    #   name: mini-agent-data
    #   mountPath: /var/data
    #   sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: MOCK
        value: "false"
      # 家教模式：true = 切换为 K12 私人家教人设（苏格拉底式启发 + 按学生水平/性格自适应）
      - key: TUTOR_MODE
        value: "true"
      # 告知应用数据根目录（免费版无挂载盘时使用默认 data/ 目录）
      # - key: RENDER_DISK_MOUNT_PATH
      #   value: /var/data
      # 以下三个是密钥：务必在 Render 后台 Environment 里手动填（sync:false 表示不从仓库读取）
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: OPENAI_MODEL
        sync: false
      # GitHub OAuth（用于插件面板的 GitHub 授权连接）
      # 需在 github.com/settings/developers 注册 OAuth App 后获取，在 Render Environment 填入
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
