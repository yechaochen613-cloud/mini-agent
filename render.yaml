# render.yaml — 一键部署到 Render（https://render.com）
# 用法：把本仓库推到 GitHub 后，在 Render 后台 New → Blueprint，选中此仓库即可自动按本文件部署。
services:
  - type: web
    name: mini-agent
    runtime: python
    plan: free
    region: oregon            # 离国内更近可选 singapore（在 Render 后台也能改）
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    # 持久盘：挂载后对话历史(SQLite)、上传文件、文档索引都落在这块盘上，
    # 服务重启 / redeploy 数据都不丢（不挂盘则数据随容器销毁）。
    disk:
      name: mini-agent-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: MOCK
        value: "true"
      # 告知应用数据根目录放在挂载盘内（storage.py 据此拼接 /var/data/mini-agent）
      - key: RENDER_DISK_MOUNT_PATH
        value: /var/data
      # 以下三个是密钥：务必在 Render 后台 Environment 里手动填（sync:false 表示不从仓库读取）
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: OPENAI_MODEL
        sync: false
