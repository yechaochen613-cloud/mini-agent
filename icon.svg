<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="eye" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 天线 + 发光顶珠 -->
  <line x1="256" y1="60" x2="256" y2="120" stroke="url(#stroke)" stroke-width="18" stroke-linecap="round"/>
  <circle cx="256" cy="44" r="26" fill="#22d3ee" filter="url(#glow)"/>

  <!-- 两侧耳节点 -->
  <rect x="86" y="206" width="34" height="86" rx="17" fill="url(#stroke)"/>
  <rect x="392" y="206" width="34" height="86" rx="17" fill="url(#stroke)"/>

  <!-- 头部外壳 -->
  <path d="M118 138 Q118 104 152 104 H360 Q394 104 394 138 V312 Q394 360 346 360 H166 Q118 360 118 312 Z"
        fill="rgba(255,255,255,0.05)" stroke="url(#stroke)" stroke-width="18" stroke-linejoin="round"/>

  <!-- 面罩 -->
  <rect x="158" y="158" width="196" height="124" rx="62" fill="#070b16" stroke="url(#stroke)" stroke-width="13"/>

  <!-- 发光双眼 -->
  <circle cx="216" cy="220" r="26" fill="url(#eye)" filter="url(#glow)"/>
  <circle cx="296" cy="220" r="26" fill="url(#eye)" filter="url(#glow)"/>

  <!-- 嘴部光带 -->
  <line x1="200" y1="316" x2="312" y2="316" stroke="url(#stroke)" stroke-width="14" stroke-linecap="round"/>
</svg>
