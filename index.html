<!DOCTYPE html>
<html lang="zh-CN" data-theme="system">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mini Agent · 智能体对话</title>
<meta name="theme-color" content="#6366f1" />
<link rel="manifest" href="/manifest.webmanifest" />
<link rel="apple-touch-icon" href="/icon.svg" />
<style>
  /* ===== 主题变量：light / dark ===== */
  :root {
    --bg-1: #eef2ff;
    --bg-2: #f5f3ff;
    --bg-3: #ecfeff;
    --glass-bg: rgba(255, 255, 255, 0.55);
    --glass-border: rgba(255, 255, 255, 0.7);
    --text: #1e293b;
    --text-dim: #64748b;
    --accent: #6366f1;
    --accent-2: #06b6d4;
    --user-bubble: linear-gradient(135deg, #6366f1, #8b5cf6);
    --bot-bubble: rgba(255, 255, 255, 0.75);
    --step-bg: rgba(99, 102, 241, 0.08);
    --shadow: 0 10px 40px rgba(99, 102, 241, 0.12);
  }
  html[data-theme="dark"] {
    --bg-1: #0f172a;
    --bg-2: #1e1b4b;
    --bg-3: #042f2e;
    --glass-bg: rgba(30, 41, 59, 0.55);
    --glass-border: rgba(148, 163, 184, 0.18);
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --accent: #818cf8;
    --accent-2: #22d3ee;
    --user-bubble: linear-gradient(135deg, #6366f1, #a855f7);
    --bot-bubble: rgba(51, 65, 85, 0.6);
    --step-bg: rgba(129, 140, 248, 0.12);
    --shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    color: var(--text);
    min-height: 100vh;
    background:
      radial-gradient(1200px 600px at 10% -10%, var(--bg-3), transparent 60%),
      radial-gradient(1000px 700px at 100% 0%, var(--bg-2), transparent 55%),
      linear-gradient(160deg, var(--bg-1), var(--bg-2));
    background-attachment: fixed;
    transition: background 0.5s ease, color 0.4s ease;
    display: flex;
    justify-content: center;
    padding: 24px 16px 40px;
  }

  .app {
    width: 100%;
    max-width: 760px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  /* ===== 顶部栏（毛玻璃） ===== */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    box-shadow: var(--shadow);
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand .logo {
    width: 40px; height: 40px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: grid; place-items: center; font-size: 20px;
    box-shadow: 0 6px 20px rgba(99,102,241,0.4);
  }
  .brand h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.2px; }
  .brand p { font-size: 12px; color: var(--text-dim); margin-top: 2px; letter-spacing: 0.6px; }
  /* ===== Cyber bot logo 微动效 ===== */
  .brand .logo { overflow: hidden; }
  .cyber-bot { display: block; }
  .cb-pulse { animation: cbPulse 2.6s ease-in-out infinite; }
  .cb-eye { animation: cbBlink 4s ease-in-out infinite; }
  .cb-eye:nth-of-type(2) { animation-delay: 0.18s; }
  @keyframes cbPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.32; } }
  @keyframes cbBlink { 0%,90%,100% { opacity: 1; } 94% { opacity: 0.2; } }

  /* ===== 主题切换（三态分段控件） ===== */
  .theme-switch {
    display: flex; padding: 4px; gap: 2px;
    background: var(--step-bg);
    border-radius: 12px;
    border: 1px solid var(--glass-border);
  }
  .theme-switch button {
    border: none; background: transparent; cursor: pointer;
    color: var(--text-dim); font-size: 12px; font-weight: 600;
    padding: 6px 10px; border-radius: 9px; transition: all 0.25s ease;
    font-family: inherit;
  }
  .theme-switch button.active {
    background: var(--glass-bg);
    color: var(--accent);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  /* ===== 顶栏右侧操作区（新对话 + 主题切换） ===== */
  .actions { display: flex; align-items: center; gap: 10px; }
  .new-chat {
    border: 1px solid var(--glass-border);
    background: var(--step-bg);
    color: var(--text);
    font-size: 12px; font-weight: 600; font-family: inherit;
    padding: 7px 12px; border-radius: 10px; cursor: pointer;
    transition: all 0.25s ease; white-space: nowrap;
  }
  .new-chat:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-1px);
  }

  /* ===== 聊天区 ===== */
  .chat {
    flex: 1;
    min-height: 420px;
    max-height: 62vh;
    overflow-y: auto;
    padding: 8px 4px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  .chat::-webkit-scrollbar { width: 8px; }
  .chat::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 8px; }

  .msg { display: flex; gap: 10px; animation: rise 0.4s cubic-bezier(0.16,1,0.3,1) both; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg .avatar {
    flex: 0 0 34px; width: 34px; height: 34px; border-radius: 10px;
    display: grid; place-items: center; font-size: 16px;
    background: var(--step-bg); border: 1px solid var(--glass-border);
  }
  .msg .bubble {
    padding: 12px 15px; border-radius: 16px; line-height: 1.65;
    font-size: 15px; max-width: 88%; white-space: pre-wrap; word-break: break-word;
  }
  .msg.user { flex-direction: row-reverse; }
  .msg.user .bubble {
    background: var(--user-bubble); color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.bot .bubble {
    background: var(--bot-bubble); border: 1px solid var(--glass-border);
    border-bottom-left-radius: 4px; backdrop-filter: blur(10px);
  }

  /* ===== 工具调用步骤（可观测性） ===== */
  .steps {
    margin-top: 10px; padding: 10px 12px;
    background: var(--step-bg); border-radius: 12px;
    border: 1px dashed var(--glass-border);
    font-size: 12.5px; color: var(--text-dim);
  }
  .steps summary {
    cursor: pointer; font-weight: 600; color: var(--accent);
    list-style: none; display: flex; align-items: center; gap: 6px;
  }
  .steps summary::-webkit-details-marker { display: none; }
  .steps .row {
    margin-top: 8px; display: flex; gap: 8px; align-items: flex-start;
    font-family: "SF Mono", ui-monospace, Menlo, monospace;
  }
  .steps .row .ic { flex: 0 0 auto; }
  .steps .row code { color: var(--text); }
  .steps .row .res { color: var(--accent-2); }

  /* ===== 输入区 ===== */
  .composer {
    display: flex; gap: 10px; align-items: flex-end;
    padding: 12px; border-radius: 20px;
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    box-shadow: var(--shadow);
  }
  .composer textarea {
    flex: 1; resize: none; border: none; outline: none; background: transparent;
    color: var(--text); font-size: 15px; line-height: 1.5; max-height: 120px;
    font-family: inherit; padding: 8px 6px;
  }
  .composer textarea::placeholder { color: var(--text-dim); }
  .send {
    flex: 0 0 auto; border: none; cursor: pointer; color: #fff;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    padding: 10px 18px; border-radius: 14px; font-weight: 700; font-size: 14px;
    font-family: inherit; transition: transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 6px 18px rgba(99,102,241,0.4);
  }
  .send:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(99,102,241,0.5); }
  .send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  /* ===== 打字指示器 ===== */
  .typing { display: flex; gap: 4px; align-items: center; padding: 4px 2px; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
    animation: blink 1.2s infinite ease-in-out both;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.25;transform:scale(0.8);} 40%{opacity:1;transform:scale(1);} }

  .hint { text-align: center; font-size: 12px; color: var(--text-dim); }

  /* ===== 人工审核卡片（Human-in-the-loop） ===== */
  .review {
    margin-top: 10px; padding: 14px; border-radius: 14px;
    background: linear-gradient(135deg, rgba(245,158,11,0.14), rgba(239,68,68,0.08));
    border: 1px solid rgba(245,158,11,0.45);
  }
  .review .rhead {
    display: flex; align-items: center; gap: 8px;
    font-weight: 700; color: #b45309; font-size: 14px;
  }
  html[data-theme="dark"] .review .rhead { color: #fbbf24; }
  .review .raction {
    margin-top: 10px; padding: 10px 12px;
    background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 10px;
  }
  .review .raction .rlabel { font-weight: 600; font-size: 13.5px; }
  .review .raction .rdetail {
    margin-top: 6px; white-space: pre-wrap; word-break: break-word;
    font-family: "SF Mono", ui-monospace, Menlo, monospace; font-size: 12px;
    color: var(--text-dim); background: var(--step-bg); padding: 6px 8px; border-radius: 8px;
  }
  .review .rbtns { margin-top: 8px; display: flex; gap: 8px; }
  .review .rbtns button {
    flex: 1; border: none; cursor: pointer; font-family: inherit;
    padding: 7px 0; border-radius: 9px; font-size: 12.5px; font-weight: 700;
    transition: transform 0.2s ease, opacity 0.2s ease;
  }
  .review .rbtns .ok { background: linear-gradient(135deg,#10b981,#059669); color:#fff; }
  .review .rbtns .no { background: var(--step-bg); color: var(--text); border: 1px solid var(--glass-border); }
  .review .rbtns button:hover { transform: translateY(-1px); }
  .review .rfooter { margin-top: 12px; display: flex; gap: 10px; }
  .review .rfooter button {
    flex: 1; border: none; cursor: pointer; font-family: inherit;
    padding: 10px 0; border-radius: 11px; font-size: 13px; font-weight: 700; color:#fff;
    transition: transform 0.2s ease;
  }
  .review .rfooter button:hover { transform: translateY(-1px); }
  .review .rfooter .all-ok { background: linear-gradient(135deg, var(--accent), var(--accent-2)); }
  .review .rfooter .all-no { background: linear-gradient(135deg, #ef4444, #f97316); }
  .review.done .rbtns, .review.done .rfooter { opacity: 0.4; pointer-events: none; }
  .review .rnote { margin-top: 8px; font-size: 12px; color: var(--text-dim); }
  .composer.disabled { opacity: 0.5; pointer-events: none; }

  /* ===== 历史对话：左侧抽屉触发按钮 ===== */
  .hist-toggle {
    border: 1px solid var(--glass-border); background: var(--glass-bg); color: var(--text);
    border-radius: 11px; padding: 8px 12px; cursor: pointer; font-family: inherit;
    font-size: 13px; font-weight: 600; transition: transform .2s, background .2s;
  }
  .hist-toggle:hover { transform: translateY(-1px); }
  .hist-toggle.active { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color:#fff; border-color: transparent; }

  .drawer-backdrop {
    position: fixed; inset: 0; background: rgba(2,6,23,.5);
    opacity: 0; pointer-events: none; transition: opacity .25s; z-index: 40;
  }
  .drawer-backdrop.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; right: 0; height: 100vh; width: 384px; max-width: 92vw;
    background: var(--bg); border-left: 1px solid var(--glass-border);
    box-shadow: -20px 0 60px rgba(0,0,0,.35); z-index: 50;
    transform: translateX(100%); transition: transform .3s cubic-bezier(.16,1,.3,1);
    display: flex; flex-direction: column; padding: 16px; gap: 12px; overflow-y: auto;
  }
  .drawer.open { transform: translateX(0); }
  /* 历史抽屉从左侧滑出 */
  .drawer.left {
    right: auto; left: 0; transform: translateX(-100%);
    border-left: none; border-right: 1px solid var(--glass-border);
    box-shadow: 20px 0 60px rgba(0,0,0,.35);
  }
  .drawer.left.open { transform: translateX(0); }

  /* ===== 附件面板（内嵌在对话框里，点 📎 展开） ===== */
  .attach-btn {
    flex: 0 0 auto; border: 1px solid var(--glass-border); background: var(--step-bg);
    color: var(--text); cursor: pointer; font-size: 18px; line-height: 1;
    width: 42px; height: 42px; border-radius: 12px; transition: all .2s ease;
    display: grid; place-items: center;
  }
  .attach-btn:hover { transform: translateY(-1px); border-color: var(--accent); }
  .attach-btn.active { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color:#fff; border-color: transparent; }
  .attach-panel {
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    border-radius: 18px; padding: 14px; backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    box-shadow: var(--shadow);
    display: flex; flex-direction: column; gap: 12px;
    max-height: 46vh; overflow-y: auto;
  }
  .attach-panel[hidden] { display: none; }
  .attach-head { display: flex; align-items: center; justify-content: space-between;
    font-size: 14px; font-weight: 700; }
  .attach-head .drawer-close { position: static; }

  /* ===== 历史列表 ===== */
  .hist-list { display: flex; flex-direction: column; gap: 8px; margin-top: 2px; }
  .hist-card {
    display: flex; align-items: center; gap: 8px;
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    border-radius: 12px; padding: 10px 12px; cursor: pointer; transition: all .18s ease;
  }
  .hist-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .hist-card .hc-main { flex: 1; min-width: 0; }
  .hist-card .hc-title { font-weight: 600; font-size: 13.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hist-card .hc-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .hist-card .hc-del {
    flex: 0 0 auto; border: none; background: var(--step-bg); color: var(--text-dim);
    width: 26px; height: 26px; border-radius: 8px; cursor: pointer; font-size: 13px; transition: color .2s;
  }
  .hist-card .hc-del:hover { color: #ef4444; }
  .drawer-head { display: flex; align-items: center; justify-content: space-between; }
  .drawer-head h2 { font-size: 16px; font-weight: 700; }
  .drawer-close { border: none; background: var(--step-bg); color: var(--text); width: 30px; height: 30px; border-radius: 9px; cursor: pointer; font-size: 14px; }

  .upload-zone {
    border: 1.5px dashed var(--glass-border); border-radius: 14px; padding: 14px;
    text-align: center; background: var(--glass-bg); transition: all .2s;
  }
  .upload-zone.drag { border-color: var(--accent); background: rgba(99,102,241,.12); }
  .upload-zone p { font-size: 12.5px; color: var(--text-dim); margin: 2px 0; }
  .up-btn { margin-top: 6px; border: none; cursor: pointer; font-family: inherit; font-weight: 700;
    padding: 8px 16px; border-radius: 10px; color:#fff; background: linear-gradient(135deg, var(--accent), var(--accent-2)); }
  .up-hint { font-size: 11px !important; margin-top: 6px !important; }
  .url-row { display: flex; gap: 6px; margin-top: 10px; }
  .url-row input { flex: 1; }
  .up-progress { font-size: 12px; color: var(--accent-2); margin-top: 8px; white-space: pre-wrap; text-align: left; }

  .doc-search { display: flex; gap: 6px; }
  .doc-search input { flex: 1; }
  input, textarea {
    background: var(--step-bg); border: 1px solid var(--glass-border); color: var(--text);
    border-radius: 10px; padding: 9px 11px; font-family: inherit; font-size: 13px; outline: none;
  }
  input:focus, textarea:focus { border-color: var(--accent); }

  .compare-bar { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; font-size: 12px;
    background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 10px; padding: 8px; }
  .compare-bar b { color: var(--accent-2); }
  .compare-bar button { border: none; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 700;
    padding: 6px 10px; border-radius: 8px; color:#fff; }
  .compare-bar #compareRun { background: linear-gradient(135deg, var(--accent), var(--accent-2)); }
  .compare-bar #compareClear { background: var(--step-bg); color: var(--text); border: 1px solid var(--glass-border); }

  .doc-list { display: flex; flex-direction: column; gap: 10px; }
  .doc-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 14px; padding: 12px; }
  .doc-card .dc-head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .doc-card .dc-name { font-weight: 700; font-size: 13.5px; word-break: break-all; }
  .type-badge { font-size: 10.5px; font-weight: 700; padding: 2px 7px; border-radius: 999px; color:#fff;
    background: linear-gradient(135deg, var(--accent), var(--accent-2)); white-space: nowrap; }
  .doc-card .dc-meta { font-size: 11.5px; color: var(--text-dim); margin-top: 5px; }
  .doc-card .dc-note { font-size: 11px; color: #fbbf24; margin-top: 4px; }
  .doc-actions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 9px; }
  .doc-actions button { border: 1px solid var(--glass-border); background: var(--step-bg); color: var(--text);
    cursor: pointer; font-family: inherit; font-size: 11.5px; font-weight: 600; padding: 5px 9px; border-radius: 8px; transition: all .18s; }
  .doc-actions button:hover { border-color: var(--accent); color: var(--accent-2); }
  .doc-actions button.sel { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color:#fff; border-color: transparent; }
  .empty-hint { font-size: 12.5px; color: var(--text-dim); text-align:center; padding: 10px; }
</style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">
          <svg class="cyber-bot" viewBox="0 0 64 64" width="28" height="28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="赛博智能体">
            <defs>
              <linearGradient id="cbStroke" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#22d3ee"/>
                <stop offset="0.5" stop-color="#a855f7"/>
                <stop offset="1" stop-color="#ec4899"/>
              </linearGradient>
              <radialGradient id="cbEye" cx="0.5" cy="0.5" r="0.5">
                <stop offset="0" stop-color="#67e8f9"/>
                <stop offset="1" stop-color="#06b6d4"/>
              </radialGradient>
              <filter id="cbGlow" x="-60%" y="-60%" width="220%" height="220%">
                <feGaussianBlur stdDeviation="1.6" result="b"/>
                <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
            <line x1="32" y1="7" x2="32" y2="14" stroke="url(#cbStroke)" stroke-width="2.4" stroke-linecap="round"/>
            <circle class="cb-pulse" cx="32" cy="5" r="3.2" fill="#22d3ee" filter="url(#cbGlow)"/>
            <rect x="11" y="26" width="4" height="10" rx="2" fill="url(#cbStroke)"/>
            <rect x="49" y="26" width="4" height="10" rx="2" fill="url(#cbStroke)"/>
            <path d="M15 17 Q15 13 19 13 H45 Q49 13 49 17 V39 Q49 45 43 45 H21 Q15 45 15 39 Z" fill="rgba(255,255,255,0.06)" stroke="url(#cbStroke)" stroke-width="2.4" stroke-linejoin="round"/>
            <rect x="20" y="20" width="24" height="15" rx="7.5" fill="#0a0f1f" stroke="url(#cbStroke)" stroke-width="1.6"/>
            <circle class="cb-eye" cx="27" cy="27.5" r="3.1" fill="url(#cbEye)" filter="url(#cbGlow)"/>
            <circle class="cb-eye" cx="37" cy="27.5" r="3.1" fill="url(#cbEye)" filter="url(#cbGlow)"/>
            <line x1="25" y1="39" x2="39" y2="39" stroke="url(#cbStroke)" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
          </svg>
        </div>
        <div>
          <h1>Mini Agent</h1>
          <p>the future</p>
        </div>
      </div>
      <div class="actions">
        <button class="hist-toggle" id="histToggle" title="历史对话">🕘 历史</button>
        <button class="new-chat" id="newChat" title="开启新对话">＋ 新对话</button>
        <div class="theme-switch" id="themeSwitch">
          <button data-theme="light">☀ 浅色</button>
          <button data-theme="dark">🌙 深色</button>
          <button data-theme="system">💻 跟随</button>
        </div>
      </div>
    </header>

    <main class="chat" id="chat"></main>

    <div class="composer">
      <button class="attach-btn" id="attachBtn" title="上传文档">📎</button>
      <textarea id="input" rows="1" placeholder="试试：我叫小明，喜欢喝咖啡（我会记住）· 明天北京天气如何 · 你还记得我叫什么吗？"></textarea>
      <button class="send" id="send">发送</button>
    </div>
    <div class="attach-panel" id="attachPanel" hidden>
      <div class="attach-head">
        <span>📎 文档上传与理解</span>
        <button class="drawer-close" id="attachClose" title="收起">✕</button>
      </div>

      <div class="upload-zone" id="uploadZone">
        <p>拖拽文件到此处，或</p>
        <button class="up-btn" id="pickFile">选择文件</button>
        <input type="file" id="fileInput" multiple hidden
               accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.csv,.html,.htm,.md,.txt,.json,.png,.jpg,.jpeg,.gif,.bmp,.webp,.tif,.tiff">
        <p class="up-hint">支持 PDF / Word / Excel / PPT / CSV / HTML / 网页 / Markdown / 文本 / JSON / 图片</p>
        <div class="url-row">
          <input type="text" id="urlInput" placeholder="或粘贴网页 URL…">
          <button class="up-btn" id="urlBtn" style="margin-top:0">抓取</button>
        </div>
        <div class="up-progress" id="upProgress"></div>
      </div>

      <div class="doc-search">
        <input type="text" id="docSearchInput" placeholder="跨文档检索，如『违约责任』">
        <button class="up-btn" id="docSearchBtn" style="margin-top:0">检索</button>
      </div>

      <div class="compare-bar" id="compareBar" hidden>
        <span>比对：<b id="cmpA"></b> ↔ <b id="cmpB"></b></span>
        <button id="compareRun">开始比对</button>
        <button id="compareClear">清除</button>
      </div>

      <div class="doc-list" id="docList">
        <div class="empty-hint">还没有文档，先上传一个试试 👆</div>
      </div>
    </div>
    <p class="hint">回车发送 · Shift+回车换行 · 智能体会自己决定调用哪些工具</p>
  </div>

  <!-- 历史对话抽屉（左侧） -->
  <div class="drawer-backdrop" id="histBackdrop"></div>
  <aside class="drawer left" id="histDrawer">
    <div class="drawer-head">
      <h2>🕘 历史对话</h2>
      <button class="drawer-close" id="histClose">✕</button>
    </div>
    <div class="hist-list" id="histList">
      <div class="empty-hint">还没有历史对话</div>
    </div>
  </aside>

<script>
  // ===== PWA：注册 Service Worker（让页面可"安装"成 App、离线秒开） =====
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }

  // ===== 主题：light / dark / system（持久化到 localStorage） =====
  const root = document.documentElement;
  const switchEl = document.getElementById('themeSwitch');
  const STORE_KEY = 'mini-agent-theme';

  function applyTheme(mode) {
    if (mode === 'system') {
      const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      root.setAttribute('data-theme', dark ? 'dark' : 'light');
    } else {
      root.setAttribute('data-theme', mode);
    }
    [...switchEl.children].forEach(b =>
      b.classList.toggle('active', b.dataset.theme === mode));
  }
  // 跟随系统变化时实时切换
  window.matchMedia('(prefers-color-scheme: dark)')
        .addEventListener('change', () => {
          if (localStorage.getItem(STORE_KEY) === 'system') applyTheme('system');
        });
  const saved = localStorage.getItem(STORE_KEY) || 'system';
  applyTheme(saved);
  switchEl.addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    const mode = btn.dataset.theme;
    localStorage.setItem(STORE_KEY, mode);
    applyTheme(mode);
  });

  // ===== 聊天逻辑 =====
  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');

  function addMessage(role, text, steps) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;
    const avatar = role === 'user' ? '🧑' : '🤖';
    let html = `<div class="avatar">${avatar}</div><div class="bubble">`;
    html += escapeHtml(text);
    if (steps && steps.length) {
      const rows = steps.map(s => {
        const argStr = Object.entries(s.args || {})
          .map(([k, v]) => `${k}=${JSON.stringify(v)}`).join(', ');
        return `<div class="row"><span class="ic">🔧</span>
          <span><code>${escapeHtml(s.tool)}(${escapeHtml(argStr)})</code>
          → <span class="res">${escapeHtml(String(s.result))}</span></span></div>`;
      }).join('');
      html += `<details class="steps"><summary>🛠 调用了 ${steps.length} 个工具</summary>${rows}</details>`;
    }
    html += `</div>`;
    wrap.innerHTML = html;
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return wrap;
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg bot';
    wrap.id = 'typing';
    wrap.innerHTML = `<div class="avatar">🤖</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  }
  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // 自动探测 API 基地址：
  //   如果页面是 file:// 协议（直接打开 HTML 文件），回退到 localhost
  //   如果是正常 HTTP 服务，用相对路径（同源）
  const API_BASE = (location.protocol === 'file:')
    ? 'http://localhost:8000'
    : '';

  // 会话 ID：第一次对话由服务端生成并回传，我们存到 localStorage，
  // 之后每次请求都原样带回 -> 同一用户连续多轮共享上下文。
  let sessionId = localStorage.getItem('mini_agent_sid') || null;
  // 是否正卡在"等待人工审批"：此时禁用输入框，避免打断中断状态
  let awaitingReview = false;

  function setInputEnabled(enabled) {
    input.disabled = !enabled;
    sendBtn.disabled = !enabled;
    document.querySelector('.composer').classList.toggle('disabled', !enabled);
  }

  async function send() {
    if (awaitingReview) {
      alert('请先处理上方的待审批操作（全部通过 / 拒绝）再继续。');
      return;
    }
    const text = input.value.trim();
    if (!text) return;
    addMessage('user', text);
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;
    showTyping();
    try {
      const resp = await fetch(`${API_BASE}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, max_steps: 5, session_id: sessionId }),
      });
      const data = await resp.json();
      // 关键：把服务端给的 session_id 存起来，下一句自动带回去
      if (data.session_id) {
        sessionId = data.session_id;
        localStorage.setItem('mini_agent_sid', sessionId);
      }
      if (data.needs_review) {
        // 图被暂停：渲染人工审核卡片，等人类点按钮后再发一次请求唤醒
        removeTyping();
        awaitingReview = true;
        setInputEnabled(false);
        renderReviewCard(data.review);
      } else {
        removeTyping();
        addMessage('bot', data.reply || '（没有返回内容）', data.steps);
        loadConversations();   // 刷新历史列表（标题/时间会更新）
      }
    } catch (err) {
      removeTyping();
      addMessage('bot', '⚠️ 调用接口出错了：' + err.message);
    } finally {
      if (!awaitingReview) {
        sendBtn.disabled = false;
        input.focus();
      }
    }
  }

  // 渲染"待审批"卡片：列出 Agent 想执行的每个操作，并给出 通过/拒绝 按钮
  function renderReviewCard(review) {
    const wrap = document.createElement('div');
    wrap.className = 'msg bot';
    const actionsHtml = review.actions.map(a => `
      <div class="raction">
        <div class="rlabel">🔸 ${escapeHtml(a.label)}</div>
        <div class="rdetail">${escapeHtml(a.detail)}</div>
        <div class="rbtns">
          <button class="ok" data-act="${escapeHtml(a.id)}" data-mode="approve">✓ 通过此条</button>
          <button class="no" data-act="${escapeHtml(a.id)}" data-mode="reject">✗ 拒绝此条</button>
        </div>
      </div>`).join('');
    wrap.innerHTML = `<div class="avatar">🤖</div><div class="bubble">
      <div class="review" id="reviewCard">
        <div class="rhead">⚠️ Agent 想执行以下操作，需要你确认</div>
        ${actionsHtml}
        <div class="rfooter">
          <button class="all-ok" id="approveAll">✅ 全部通过</button>
          <button class="all-no" id="rejectAll">⛔ 全部拒绝</button>
        </div>
        <div class="rnote" id="reviewNote"></div>
      </div>
    </div>`;
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;

    const card = wrap.querySelector('#reviewCard');
    card.querySelectorAll('.rbtns button').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.act, mode = btn.dataset.mode;
        const otherIds = review.actions.filter(a => a.id !== id).map(a => a.id);
        const decision = mode === 'approve'
          ? { decision: 'custom', approved: [id], rejected: otherIds }
          : { decision: 'custom', approved: otherIds, rejected: [id] };
        submitDecision(decision, card);
      });
    });
    card.querySelector('#approveAll').addEventListener('click', () => submitDecision({ decision: 'approve_all' }, card));
    card.querySelector('#rejectAll').addEventListener('click', () => submitDecision({ decision: 'reject_all' }, card));
  }

  // 把人类的决定发回服务端，唤醒被中断的图，然后展示最终回复
  async function submitDecision(decision, card) {
    card.classList.add('done');
    showTyping();
    try {
      const resp = await fetch(`${API_BASE}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, review_decision: decision }),
      });
      const data = await resp.json();
      removeTyping();
      const note = card.querySelector('#reviewNote');
      if (note) note.textContent = '（已处理 ✓）';
      if (data.reply) addMessage('bot', data.reply, data.steps);
    } catch (err) {
      removeTyping();
      const note = card.querySelector('#reviewNote');
      if (note) note.textContent = '⚠️ 处理出错：' + err.message;
    } finally {
      awaitingReview = false;
      setInputEnabled(true);
      input.focus();
    }
  }

  // 开启新对话：旧会话保留在历史里（清掉 LangGraph 内存），再新建一个会话
  async function newChat() {
    const oldId = sessionId;
    awaitingReview = false;
    setInputEnabled(true);
    // 旧会话保留在历史记录；只清空 LangGraph 的上下文
    if (oldId) {
      try {
        await fetch(`${API_BASE}/reset`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: oldId }),
        });
      } catch (e) { /* 忽略 */ }
    }
    // 新建一个会话记录（会出现在历史列表里）
    try {
      const r = await fetch(`${API_BASE}/conversations?title=${encodeURIComponent('新对话')}`, { method: 'POST' });
      const c = await r.json();
      sessionId = c.id;
      localStorage.setItem('mini_agent_sid', c.id);
    } catch (e) { sessionId = null; localStorage.removeItem('mini_agent_sid'); }
    chat.innerHTML = '';
    await loadConversations();
    addMessage('bot', OPENING_TEXT);
  }

  sendBtn.addEventListener('click', send);
  document.getElementById('newChat').addEventListener('click', newChat);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  // 自动撑高输入框
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  // ===== 附件面板（文档上传，内嵌在对话框里） =====
  let docs = [];                 // 当前文档列表（结构化摘要）
  let cmp = { a: null, b: null };// 比对选择
  const attachPanel = document.getElementById('attachPanel');
  const attachBtn = document.getElementById('attachBtn');
  function toggleAttach(force) {
    const open = force === undefined ? attachPanel.hidden : force;
    attachPanel.hidden = !open;
    attachBtn.classList.toggle('active', open);
    if (open) loadDocs();
  }
  attachBtn.addEventListener('click', () => toggleAttach());
  document.getElementById('attachClose').addEventListener('click', () => toggleAttach(false));

  // ===== 历史对话抽屉（左侧） =====
  const histDrawer = document.getElementById('histDrawer');
  const histBackdrop = document.getElementById('histBackdrop');
  const histToggle = document.getElementById('histToggle');
  function openHistory() { histDrawer.classList.add('open'); histBackdrop.classList.add('open'); loadConversations(); }
  function closeHistory() { histDrawer.classList.remove('open'); histBackdrop.classList.remove('open'); }
  histToggle.addEventListener('click', () => histDrawer.classList.contains('open') ? closeHistory() : openHistory());
  document.getElementById('histClose').addEventListener('click', closeHistory);
  histBackdrop.addEventListener('click', closeHistory);

  // 拉取历史列表并渲染
  async function loadConversations() {
    try {
      const r = await fetch(`${API_BASE}/conversations`);
      const data = await r.json();
      renderHistory(data.conversations || []);
      return data.conversations || [];
    } catch (e) { return []; }
  }
  function renderHistory(list) {
    const el = document.getElementById('histList');
    if (!list.length) { el.innerHTML = '<div class="empty-hint">还没有历史对话</div>'; return; }
    el.innerHTML = list.map(c => `
      <div class="hist-card" data-id="${escapeHtml(c.id)}">
        <div class="hc-main">
          <div class="hc-title">${escapeHtml(c.title || '新对话')}</div>
          <div class="hc-meta">${escapeHtml(c.updated_fmt || '')} · ${c.msg_count} 条消息</div>
        </div>
        <button class="hc-del" data-id="${escapeHtml(c.id)}" title="删除">🗑</button>
      </div>`).join('');
    el.querySelectorAll('.hist-card').forEach(card => {
      card.addEventListener('click', e => {
        if (e.target.closest('.hc-del')) return;
        loadConversation(card.dataset.id);
      });
    });
    el.querySelectorAll('.hc-del').forEach(btn => {
      btn.addEventListener('click', async e => {
        e.stopPropagation();
        if (!confirm('确定删除这条历史对话？')) return;
        try {
          await fetch(`${API_BASE}/conversations/${btn.dataset.id}`, { method: 'DELETE' });
          if (sessionId === btn.dataset.id) {
            sessionId = null; localStorage.removeItem('mini_agent_sid');
          }
          await loadConversations();
        } catch (err) { alert('删除失败：' + err.message); }
      });
    });
  }
  // 回看某次历史会话：把它的消息渲染回聊天区
  async function loadConversation(sid) {
    try {
      const r = await fetch(`${API_BASE}/conversations/${sid}`);
      const c = await r.json();
      sessionId = sid;
      localStorage.setItem('mini_agent_sid', sid);
      chat.innerHTML = '';
      (c.messages || []).forEach(m => addMessage(m.role, m.text, m.steps));
      closeHistory();
      input.focus();
    } catch (e) { alert('加载失败：' + e.message); }
  }
  // 初始化：确保有一个当前会话（已存在则复用，否则新建），用于落历史
  async function ensureCurrent() {
    const sid = localStorage.getItem('mini_agent_sid');
    if (sid) {
      const list = await loadConversations();
      if (list.find(c => c.id === sid)) { sessionId = sid; return; }
    }
    try {
      const r = await fetch(`${API_BASE}/conversations?title=${encodeURIComponent('新对话')}`, { method: 'POST' });
      const c = await r.json();
      sessionId = c.id;
      localStorage.setItem('mini_agent_sid', c.id);
    } catch (e) { sessionId = null; }
  }

  function renderDocs() {
    const list = document.getElementById('docList');
    if (!docs.length) {
      list.innerHTML = '<div class="empty-hint">还没有文档，先上传一个试试 👆</div>';
      return;
    }
    list.innerHTML = docs.map(d => {
      const note = d.notes ? `<div class="dc-note">⚠ ${escapeHtml(d.notes)}</div>` : '';
      const selA = cmp.a === d.id ? 'sel' : '';
      const selB = cmp.b === d.id ? 'sel' : '';
      return `<div class="doc-card" data-id="${d.id}">
        <div class="dc-head"><span class="type-badge">${escapeHtml(d.type)}</span>${d.ocr ? '<span class="type-badge">OCR</span>' : ''}<span class="dc-name">${escapeHtml(d.name)}</span></div>
        <div class="dc-meta">${d.chars} 字 · 表格 ${d.tables} · 分块 ${d.chunks} · 条款 ${d.clauses} · 标题 ${d.headings}</div>
        ${note}
        <div class="doc-actions">
          <button data-act="text">读全文</button>
          <button data-act="tables">表格</button>
          <button data-act="clauses">条款</button>
          <button data-act="search">检索此文档</button>
          <button data-act="cmpA" class="${selA}">选为 A</button>
          <button data-act="cmpB" class="${selB}">选为 B</button>
        </div>
      </div>`;
    }).join('');
    list.querySelectorAll('.doc-card').forEach(card => {
      const id = card.dataset.id;
      card.querySelectorAll('.doc-actions button').forEach(btn =>
        btn.addEventListener('click', () => onDocAction(btn.dataset.act, id)));
    });
  }

  async function loadDocs() {
    try {
      const r = await fetch(`${API_BASE}/documents`);
      const data = await r.json();
      docs = data.documents || [];
      renderDocs();
    } catch (e) { /* 忽略：抽屉还没打开时不影响聊天 */ }
  }

  async function onDocAction(act, id) {
    if (act === 'cmpA') { cmp.a = id; renderDocs(); updateCompareBar(); return; }
    if (act === 'cmpB') { cmp.b = id; renderDocs(); updateCompareBar(); return; }
    if (act === 'search') {
      const q = prompt('要在这篇文档里检索什么关键词？');
      if (q) runSearch(q);
      return;
    }
    let url, label;
    if (act === 'text') { url = `${API_BASE}/documents/${id}/text?max_chars=4000`; label = '读全文'; }
    else if (act === 'tables') { url = `${API_BASE}/documents/${id}/tables`; label = '提取表格'; }
    else if (act === 'clauses') { url = `${API_BASE}/documents/${id}/clauses`; label = '提取条款'; }
    try {
      showTyping();
      const r = await fetch(url);
      const data = await r.json();
      removeTyping();
      let text;
      if (act === 'tables') text = fmtTables(data.tables || []);
      else text = data.text || JSON.stringify(data, null, 2);
      addMessage('bot', `【${label}】《${(docs.find(d => d.id === id) || {}).name || id}》\n${text}`);
    } catch (e) {
      removeTyping();
      addMessage('bot', '⚠️ 操作失败：' + e.message);
    }
  }

  function fmtTables(tables) {
    if (!tables.length) return '（未检测到表格）';
    return tables.map((t, i) => {
      const cap = t.caption || ('表 ' + (i + 1));
      const head = '| ' + (t.headers || []).join(' | ') + ' |';
      const sep = '| ' + (t.headers || []).map(() => '---').join(' | ') + ' |';
      const rows = (t.rows || []).slice(0, 30).map(r => '| ' + r.join(' | ') + ' |').join('\n');
      return `▍${cap}\n${head}\n${sep}\n${rows}`;
    }).join('\n\n');
  }

  async function runSearch(q) {
    try {
      showTyping();
      const r = await fetch(`${API_BASE}/documents/search`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: q, top_k: 5 }),
      });
      const data = await r.json();
      removeTyping();
      addMessage('bot', `【跨文档检索：${q}】\n${data.result}`);
    } catch (e) { removeTyping(); addMessage('bot', '⚠️ 检索失败：' + e.message); }
  }

  document.getElementById('docSearchBtn').addEventListener('click', () => {
    const q = document.getElementById('docSearchInput').value.trim();
    if (q) runSearch(q);
  });
  document.getElementById('docSearchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') { const q = e.target.value.trim(); if (q) runSearch(q); }
  });

  function updateCompareBar() {
    const bar = document.getElementById('compareBar');
    const a = docs.find(d => d.id === cmp.a), b = docs.find(d => d.id === cmp.b);
    if (a && b) {
      bar.hidden = false;
      document.getElementById('cmpA').textContent = a.name;
      document.getElementById('cmpB').textContent = b.name;
    } else bar.hidden = true;
  }
  document.getElementById('compareRun').addEventListener('click', async () => {
    if (!cmp.a || !cmp.b) return;
    try {
      showTyping();
      const r = await fetch(`${API_BASE}/documents/compare`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ a: cmp.a, b: cmp.b }),
      });
      const data = await r.json();
      removeTyping();
      addMessage('bot', `【跨文档比对】\n${data.result}`);
    } catch (e) { removeTyping(); addMessage('bot', '⚠️ 比对失败：' + e.message); }
  });
  document.getElementById('compareClear').addEventListener('click', () => {
    cmp = { a: null, b: null }; renderDocs(); updateCompareBar();
  });

  // 上传（文件 + 拖拽 + 网页 URL）
  const fileInput = document.getElementById('fileInput');
  document.getElementById('pickFile').addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => uploadFiles(fileInput.files));
  const uploadZone = document.getElementById('uploadZone');
  ['dragenter', 'dragover'].forEach(ev => uploadZone.addEventListener(ev, e => { e.preventDefault(); uploadZone.classList.add('drag'); }));
  ['dragleave', 'drop'].forEach(ev => uploadZone.addEventListener(ev, e => { e.preventDefault(); uploadZone.classList.remove('drag'); }));
  uploadZone.addEventListener('drop', e => { if (e.dataTransfer.files.length) uploadFiles(e.dataTransfer.files); });

  async function uploadFiles(files) {
    if (!files || !files.length) return;
    const prog = document.getElementById('upProgress');
    prog.textContent = '上传解析中…';
    const fd = new FormData();
    for (const f of files) fd.append('files', f);
    try {
      const r = await fetch(`${API_BASE}/upload`, { method: 'POST', body: fd });
      const data = await r.json();
      prog.textContent = (data.docs || []).map(d => d.error ? `⚠ ${d.error}` : `✓ ${d.name}（${d.chars} 字 · 表格 ${d.tables} · 分块 ${d.chunks}）`).join('\n');
      await loadDocs();
    } catch (e) { prog.textContent = '⚠️ 上传失败：' + e.message; }
  }
  document.getElementById('urlBtn').addEventListener('click', async () => {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) return;
    const prog = document.getElementById('upProgress');
    prog.textContent = '抓取网页中…';
    const fd = new FormData(); fd.append('url', url);
    try {
      const r = await fetch(`${API_BASE}/upload`, { method: 'POST', body: fd });
      const data = await r.json();
      prog.textContent = (data.docs || []).map(d => d.error ? `⚠ ${d.error}` : `✓ ${d.name}（${d.chars} 字）`).join('\n');
      await loadDocs();
    } catch (e) { prog.textContent = '⚠️ 抓取失败：' + e.message; }
  });

  // 开场白（固定文案，不写入历史）
  const OPENING_TEXT = '你好！我是你的智能体助手 👋\n我会自己决定调用工具来帮你办事，现在我能：\n· 🧮 算算术　· 🕐 报时间　· 📝 记/看笔记\n· 🌤 查天气（如"北京天气怎么样"）\n· 🔍 联网搜索（如"搜索 量子计算"）\n· 🧠 长期记忆：告诉我"我叫小明，喜欢喝咖啡"，以后换对话我也能想起来\n· 📎 上传文档：点输入框左边的 📎 上传 PDF/Word/Excel/PPT/CSV/网页 等，我能自动解析、切块、提取表格/条款/层级，还能跨文档检索与比对\n· 🔌 MCP 工具：我还能即插即用地调用标准 MCP server 提供的工具（如演示用的 reverse_text / get_server_time，配置见 mcp_servers.json）\n\n🔐 安全提示：当我要"写笔记 / 写长期记忆"这类会改变数据的操作时，会先停下问你确认，你点通过或拒绝后才执行。\n· 🕘 点左上角「🕘 历史」可以查看和切换历史对话。\n试试看吧～';

  // 初始化：确保有当前会话 + 渲染历史列表 + 显示开场白
  (async function init() {
    await ensureCurrent();
    await loadConversations();
    addMessage('bot', OPENING_TEXT);
  })();
</script>
</body>
</html>
