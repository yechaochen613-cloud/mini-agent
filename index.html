<!DOCTYPE html>
<html lang="zh-CN" data-theme="system">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mini Agent · 智能体对话</title>
<meta name="theme-color" content="#6366f1" />
<link rel="manifest" href="/manifest.webmanifest" />
<link rel="apple-touch-icon" href="/icon.svg" />
<style>
  /* ===== 主题变量：light / dark ===== */
  :root {
    --bg-1: #eef2ff;
    --bg-2: #f5f3ff;
    --bg-3: #ecfeff;
    --glass-bg: rgba(255, 255, 255, 0.55);
    --glass-border: rgba(255, 255, 255, 0.7);
    --text: #1e293b;
    --text-dim: #64748b;
    --accent: #6366f1;
    --accent-2: #06b6d4;
    --user-bubble: linear-gradient(135deg, #6366f1, #8b5cf6);
    --bot-bubble: rgba(255, 255, 255, 0.75);
    --step-bg: rgba(99, 102, 241, 0.08);
    --shadow: 0 10px 40px rgba(99, 102, 241, 0.12);
  }
  html[data-theme="dark"] {
    --bg-1: #0f172a;
    --bg-2: #1e1b4b;
    --bg-3: #042f2e;
    --glass-bg: rgba(30, 41, 59, 0.55);
    --glass-border: rgba(148, 163, 184, 0.18);
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --accent: #818cf8;
    --accent-2: #22d3ee;
    --user-bubble: linear-gradient(135deg, #6366f1, #a855f7);
    --bot-bubble: rgba(51, 65, 85, 0.6);
    --step-bg: rgba(129, 140, 248, 0.12);
    --shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    color: var(--text);
    min-height: 100vh;
    background:
      radial-gradient(1200px 600px at 10% -10%, var(--bg-3), transparent 60%),
      radial-gradient(1000px 700px at 100% 0%, var(--bg-2), transparent 55%),
      linear-gradient(160deg, var(--bg-1), var(--bg-2));
    background-attachment: fixed;
    transition: background 0.5s ease, color 0.4s ease;
    display: flex;
    justify-content: center;
    padding: 24px 16px 40px;
  }

  .app {
    width: 100%;
    max-width: 760px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  /* ===== 顶部栏（毛玻璃） ===== */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    box-shadow: var(--shadow);
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand .logo {
    width: 40px; height: 40px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: grid; place-items: center; font-size: 20px;
    box-shadow: 0 6px 20px rgba(99,102,241,0.4);
  }
  .brand h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.2px; }
  .brand p { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  /* ===== 主题切换（三态分段控件） ===== */
  .theme-switch {
    display: flex; padding: 4px; gap: 2px;
    background: var(--step-bg);
    border-radius: 12px;
    border: 1px solid var(--glass-border);
  }
  .theme-switch button {
    border: none; background: transparent; cursor: pointer;
    color: var(--text-dim); font-size: 12px; font-weight: 600;
    padding: 6px 10px; border-radius: 9px; transition: all 0.25s ease;
    font-family: inherit;
  }
  .theme-switch button.active {
    background: var(--glass-bg);
    color: var(--accent);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  /* ===== 顶栏右侧操作区（新对话 + 主题切换） ===== */
  .actions { display: flex; align-items: center; gap: 10px; }
  .new-chat {
    border: 1px solid var(--glass-border);
    background: var(--step-bg);
    color: var(--text);
    font-size: 12px; font-weight: 600; font-family: inherit;
    padding: 7px 12px; border-radius: 10px; cursor: pointer;
    transition: all 0.25s ease; white-space: nowrap;
  }
  .new-chat:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-1px);
  }

  /* ===== 聊天区 ===== */
  .chat {
    flex: 1;
    min-height: 420px;
    max-height: 62vh;
    overflow-y: auto;
    padding: 8px 4px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  .chat::-webkit-scrollbar { width: 8px; }
  .chat::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 8px; }

  .msg { display: flex; gap: 10px; animation: rise 0.4s cubic-bezier(0.16,1,0.3,1) both; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg .avatar {
    flex: 0 0 34px; width: 34px; height: 34px; border-radius: 10px;
    display: grid; place-items: center; font-size: 16px;
    background: var(--step-bg); border: 1px solid var(--glass-border);
  }
  .msg .bubble {
    padding: 12px 15px; border-radius: 16px; line-height: 1.65;
    font-size: 15px; max-width: 88%; white-space: pre-wrap; word-break: break-word;
  }
  .msg.user { flex-direction: row-reverse; }
  .msg.user .bubble {
    background: var(--user-bubble); color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.bot .bubble {
    background: var(--bot-bubble); border: 1px solid var(--glass-border);
    border-bottom-left-radius: 4px; backdrop-filter: blur(10px);
  }

  /* ===== 工具调用步骤（可观测性） ===== */
  .steps {
    margin-top: 10px; padding: 10px 12px;
    background: var(--step-bg); border-radius: 12px;
    border: 1px dashed var(--glass-border);
    font-size: 12.5px; color: var(--text-dim);
  }
  .steps summary {
    cursor: pointer; font-weight: 600; color: var(--accent);
    list-style: none; display: flex; align-items: center; gap: 6px;
  }
  .steps summary::-webkit-details-marker { display: none; }
  .steps .row {
    margin-top: 8px; display: flex; gap: 8px; align-items: flex-start;
    font-family: "SF Mono", ui-monospace, Menlo, monospace;
  }
  .steps .row .ic { flex: 0 0 auto; }
  .steps .row code { color: var(--text); }
  .steps .row .res { color: var(--accent-2); }

  /* ===== 输入区 ===== */
  .composer {
    display: flex; gap: 10px; align-items: flex-end;
    padding: 12px; border-radius: 20px;
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    box-shadow: var(--shadow);
  }
  .composer textarea {
    flex: 1; resize: none; border: none; outline: none; background: transparent;
    color: var(--text); font-size: 15px; line-height: 1.5; max-height: 120px;
    font-family: inherit; padding: 8px 6px;
  }
  .composer textarea::placeholder { color: var(--text-dim); }
  .send {
    flex: 0 0 auto; border: none; cursor: pointer; color: #fff;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    padding: 10px 18px; border-radius: 14px; font-weight: 700; font-size: 14px;
    font-family: inherit; transition: transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 6px 18px rgba(99,102,241,0.4);
  }
  .send:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(99,102,241,0.5); }
  .send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  /* ===== 打字指示器 ===== */
  .typing { display: flex; gap: 4px; align-items: center; padding: 4px 2px; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
    animation: blink 1.2s infinite ease-in-out both;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.25;transform:scale(0.8);} 40%{opacity:1;transform:scale(1);} }

  .hint { text-align: center; font-size: 12px; color: var(--text-dim); }

  /* ===== 人工审核卡片（Human-in-the-loop） ===== */
  .review {
    margin-top: 10px; padding: 14px; border-radius: 14px;
    background: linear-gradient(135deg, rgba(245,158,11,0.14), rgba(239,68,68,0.08));
    border: 1px solid rgba(245,158,11,0.45);
  }
  .review .rhead {
    display: flex; align-items: center; gap: 8px;
    font-weight: 700; color: #b45309; font-size: 14px;
  }
  html[data-theme="dark"] .review .rhead { color: #fbbf24; }
  .review .raction {
    margin-top: 10px; padding: 10px 12px;
    background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 10px;
  }
  .review .raction .rlabel { font-weight: 600; font-size: 13.5px; }
  .review .raction .rdetail {
    margin-top: 6px; white-space: pre-wrap; word-break: break-word;
    font-family: "SF Mono", ui-monospace, Menlo, monospace; font-size: 12px;
    color: var(--text-dim); background: var(--step-bg); padding: 6px 8px; border-radius: 8px;
  }
  .review .rbtns { margin-top: 8px; display: flex; gap: 8px; }
  .review .rbtns button {
    flex: 1; border: none; cursor: pointer; font-family: inherit;
    padding: 7px 0; border-radius: 9px; font-size: 12.5px; font-weight: 700;
    transition: transform 0.2s ease, opacity 0.2s ease;
  }
  .review .rbtns .ok { background: linear-gradient(135deg,#10b981,#059669); color:#fff; }
  .review .rbtns .no { background: var(--step-bg); color: var(--text); border: 1px solid var(--glass-border); }
  .review .rbtns button:hover { transform: translateY(-1px); }
  .review .rfooter { margin-top: 12px; display: flex; gap: 10px; }
  .review .rfooter button {
    flex: 1; border: none; cursor: pointer; font-family: inherit;
    padding: 10px 0; border-radius: 11px; font-size: 13px; font-weight: 700; color:#fff;
    transition: transform 0.2s ease;
  }
  .review .rfooter button:hover { transform: translateY(-1px); }
  .review .rfooter .all-ok { background: linear-gradient(135deg, var(--accent), var(--accent-2)); }
  .review .rfooter .all-no { background: linear-gradient(135deg, #ef4444, #f97316); }
  .review.done .rbtns, .review.done .rfooter { opacity: 0.4; pointer-events: none; }
  .review .rnote { margin-top: 8px; font-size: 12px; color: var(--text-dim); }
  .composer.disabled { opacity: 0.5; pointer-events: none; }
</style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">🤖</div>
        <div>
          <h1>Mini Agent</h1>
          <p>会自己调工具的中文智能体</p>
        </div>
      </div>
      <div class="actions">
        <button class="new-chat" id="newChat" title="开启新对话">＋ 新对话</button>
        <div class="theme-switch" id="themeSwitch">
          <button data-theme="light">☀ 浅色</button>
          <button data-theme="dark">🌙 深色</button>
          <button data-theme="system">💻 跟随</button>
        </div>
      </div>
    </header>

    <main class="chat" id="chat"></main>

    <div class="composer">
      <textarea id="input" rows="1" placeholder="试试：我叫小明，喜欢喝咖啡（我会记住）· 明天北京天气如何 · 你还记得我叫什么吗？"></textarea>
      <button class="send" id="send">发送</button>
    </div>
    <p class="hint">回车发送 · Shift+回车换行 · 智能体会自己决定调用哪些工具</p>
  </div>

<script>
  // ===== PWA：注册 Service Worker（让页面可"安装"成 App、离线秒开） =====
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }

  // ===== 主题：light / dark / system（持久化到 localStorage） =====
  const root = document.documentElement;
  const switchEl = document.getElementById('themeSwitch');
  const STORE_KEY = 'mini-agent-theme';

  function applyTheme(mode) {
    if (mode === 'system') {
      const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      root.setAttribute('data-theme', dark ? 'dark' : 'light');
    } else {
      root.setAttribute('data-theme', mode);
    }
    [...switchEl.children].forEach(b =>
      b.classList.toggle('active', b.dataset.theme === mode));
  }
  // 跟随系统变化时实时切换
  window.matchMedia('(prefers-color-scheme: dark)')
        .addEventListener('change', () => {
          if (localStorage.getItem(STORE_KEY) === 'system') applyTheme('system');
        });
  const saved = localStorage.getItem(STORE_KEY) || 'system';
  applyTheme(saved);
  switchEl.addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    const mode = btn.dataset.theme;
    localStorage.setItem(STORE_KEY, mode);
    applyTheme(mode);
  });

  // ===== 聊天逻辑 =====
  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');

  function addMessage(role, text, steps) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;
    const avatar = role === 'user' ? '🧑' : '🤖';
    let html = `<div class="avatar">${avatar}</div><div class="bubble">`;
    html += escapeHtml(text);
    if (steps && steps.length) {
      const rows = steps.map(s => {
        const argStr = Object.entries(s.args || {})
          .map(([k, v]) => `${k}=${JSON.stringify(v)}`).join(', ');
        return `<div class="row"><span class="ic">🔧</span>
          <span><code>${escapeHtml(s.tool)}(${escapeHtml(argStr)})</code>
          → <span class="res">${escapeHtml(String(s.result))}</span></span></div>`;
      }).join('');
      html += `<details class="steps"><summary>🛠 调用了 ${steps.length} 个工具</summary>${rows}</details>`;
    }
    html += `</div>`;
    wrap.innerHTML = html;
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return wrap;
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg bot';
    wrap.id = 'typing';
    wrap.innerHTML = `<div class="avatar">🤖</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  }
  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // 自动探测 API 基地址：
  //   如果页面是 file:// 协议（直接打开 HTML 文件），回退到 localhost
  //   如果是正常 HTTP 服务，用相对路径（同源）
  const API_BASE = (location.protocol === 'file:')
    ? 'http://localhost:8000'
    : '';

  // 会话 ID：第一次对话由服务端生成并回传，我们存到 localStorage，
  // 之后每次请求都原样带回 -> 同一用户连续多轮共享上下文。
  let sessionId = localStorage.getItem('mini_agent_sid') || null;
  // 是否正卡在"等待人工审批"：此时禁用输入框，避免打断中断状态
  let awaitingReview = false;

  function setInputEnabled(enabled) {
    input.disabled = !enabled;
    sendBtn.disabled = !enabled;
    document.querySelector('.composer').classList.toggle('disabled', !enabled);
  }

  async function send() {
    if (awaitingReview) {
      alert('请先处理上方的待审批操作（全部通过 / 拒绝）再继续。');
      return;
    }
    const text = input.value.trim();
    if (!text) return;
    addMessage('user', text);
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;
    showTyping();
    try {
      const resp = await fetch(`${API_BASE}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, max_steps: 5, session_id: sessionId }),
      });
      const data = await resp.json();
      // 关键：把服务端给的 session_id 存起来，下一句自动带回去
      if (data.session_id) {
        sessionId = data.session_id;
        localStorage.setItem('mini_agent_sid', sessionId);
      }
      if (data.needs_review) {
        // 图被暂停：渲染人工审核卡片，等人类点按钮后再发一次请求唤醒
        removeTyping();
        awaitingReview = true;
        setInputEnabled(false);
        renderReviewCard(data.review);
      } else {
        removeTyping();
        addMessage('bot', data.reply || '（没有返回内容）', data.steps);
      }
    } catch (err) {
      removeTyping();
      addMessage('bot', '⚠️ 调用接口出错了：' + err.message);
    } finally {
      if (!awaitingReview) {
        sendBtn.disabled = false;
        input.focus();
      }
    }
  }

  // 渲染"待审批"卡片：列出 Agent 想执行的每个操作，并给出 通过/拒绝 按钮
  function renderReviewCard(review) {
    const wrap = document.createElement('div');
    wrap.className = 'msg bot';
    const actionsHtml = review.actions.map(a => `
      <div class="raction">
        <div class="rlabel">🔸 ${escapeHtml(a.label)}</div>
        <div class="rdetail">${escapeHtml(a.detail)}</div>
        <div class="rbtns">
          <button class="ok" data-act="${escapeHtml(a.id)}" data-mode="approve">✓ 通过此条</button>
          <button class="no" data-act="${escapeHtml(a.id)}" data-mode="reject">✗ 拒绝此条</button>
        </div>
      </div>`).join('');
    wrap.innerHTML = `<div class="avatar">🤖</div><div class="bubble">
      <div class="review" id="reviewCard">
        <div class="rhead">⚠️ Agent 想执行以下操作，需要你确认</div>
        ${actionsHtml}
        <div class="rfooter">
          <button class="all-ok" id="approveAll">✅ 全部通过</button>
          <button class="all-no" id="rejectAll">⛔ 全部拒绝</button>
        </div>
        <div class="rnote" id="reviewNote"></div>
      </div>
    </div>`;
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;

    const card = wrap.querySelector('#reviewCard');
    card.querySelectorAll('.rbtns button').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.act, mode = btn.dataset.mode;
        const otherIds = review.actions.filter(a => a.id !== id).map(a => a.id);
        const decision = mode === 'approve'
          ? { decision: 'custom', approved: [id], rejected: otherIds }
          : { decision: 'custom', approved: otherIds, rejected: [id] };
        submitDecision(decision, card);
      });
    });
    card.querySelector('#approveAll').addEventListener('click', () => submitDecision({ decision: 'approve_all' }, card));
    card.querySelector('#rejectAll').addEventListener('click', () => submitDecision({ decision: 'reject_all' }, card));
  }

  // 把人类的决定发回服务端，唤醒被中断的图，然后展示最终回复
  async function submitDecision(decision, card) {
    card.classList.add('done');
    showTyping();
    try {
      const resp = await fetch(`${API_BASE}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, review_decision: decision }),
      });
      const data = await resp.json();
      removeTyping();
      const note = card.querySelector('#reviewNote');
      if (note) note.textContent = '（已处理 ✓）';
      if (data.reply) addMessage('bot', data.reply, data.steps);
    } catch (err) {
      removeTyping();
      const note = card.querySelector('#reviewNote');
      if (note) note.textContent = '⚠️ 处理出错：' + err.message;
    } finally {
      awaitingReview = false;
      setInputEnabled(true);
      input.focus();
    }
  }

  // 开启新对话：清空本地会话 ID + 聊天界面（并尽力通知服务端释放历史）
  async function newChat() {
    const oldId = sessionId;
    sessionId = null;
    localStorage.removeItem('mini_agent_sid');
    awaitingReview = false;
    setInputEnabled(true);
    chat.innerHTML = '';
    if (oldId) {
      try {
        await fetch(`${API_BASE}/reset`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: oldId }),
        });
      } catch (e) { /* 释放失败不影响前端开新对话 */ }
    }
    // 重新显示开场白
    addMessage('bot', '已开启新对话 🌟 刚才的上下文已清空，我们重新开始吧～');
  }

  sendBtn.addEventListener('click', send);
  document.getElementById('newChat').addEventListener('click', newChat);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  // 自动撑高输入框
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  // 开场白
