# 智伴私教 - docker-compose (Oracle VM 上运行)
# 数据库用同实例 PostgreSQL（免费、常驻、数据持久化到卷）
services:
  api:
    build: .
    restart: always
    ports:
      - "8000:8000"
    env_file: .env          # 含 OPENAI_* / GITHUB_* / DATABASE_URL
    environment:
      # DATABASE_URL 指向同 compose 的 db 服务（见 .env 示例）
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: miniagent
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: miniagent
    volumes:
      - pgdata:/var/lib/postgresql/data
    # 不暴露到公网，仅供 api 容器内部访问

volumes:
  pgdata:
